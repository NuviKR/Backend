spring:
  application:
    name: nuvi-backend

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

nuvi:
  auth:
    kakao:
      rest-api-key: ${NUVI_KAKAO_REST_API_KEY:}
      client-secret: ${NUVI_KAKAO_CLIENT_SECRET:}
      token-uri: ${NUVI_KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
      issuer: ${NUVI_KAKAO_ISSUER:https://kauth.kakao.com}
      jwks-uri: ${NUVI_KAKAO_JWKS_URI:https://kauth.kakao.com/.well-known/jwks.json}
